[alias]
# Run library tests on the host (no ESP toolchain needed).
# Adjust the target triple if developing on a different architecture
# (e.g. aarch64-unknown-linux-gnu, aarch64-apple-darwin).
test-host = "test --target x86_64-unknown-linux-gnu --no-default-features --features std,json --config unstable.build-std=[]"

[build]
# Default target: ESP32-S2 (development board)
# To build for ESP32, change to "xtensa-esp32-espidf" and set MCU="esp32" below
target = "xtensa-esp32s2-espidf"

[target.xtensa-esp32s2-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = [ "--cfg",  "espidf_time64"]

[target.xtensa-esp32-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = [ "--cfg",  "espidf_time64"]

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU="esp32s2"
# Note: this variable is not used by the pio builder (`cargo build --features pio`)
ESP_IDF_VERSION = "v5.3.3"
