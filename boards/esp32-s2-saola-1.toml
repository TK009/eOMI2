# Board configuration: ESP32-S2-Saola-1
#
# Selected at build time via: EOMI_BOARD=esp32-s2-saola-1
# Parsed by build.rs → generates gpio_config.rs const arrays in OUT_DIR.
#
# Note: GPIO 18 is connected to an onboard WS2812 RGB LED on this board.
# It must NOT be used as general-purpose PWM — the WS2812 interprets PWM
# signals as pixel data, causing unintended LED behaviour (e.g. full white).
# The neopixel_pin field ensures firmware drives it low at boot.

[board]
name = "ESP32-S2-Saola-1"
chip = "esp32s2"
has_temp_sensor = true
neopixel_pin = 18
# Onboarding display mode: "color" (WS2812 RGB), "digit" (blink LED), or "none".
# Default: "color" when neopixel_pin is set, "digit" when LED GPIO exists, else "none".
onboard_display = "color"

# GPIO pin definitions.
# Each entry: pin number, mode, optional custom name.
# Modes: digital_in, digital_out, analog_in, pwm, low_edge_trigger, high_edge_trigger

[[gpio]]
pin = 2
mode = "digital_out"
name = "LED"

[[gpio]]
pin = 5
mode = "digital_in"

[[gpio]]
pin = 3
mode = "analog_in"

# Peripheral protocol buses.
# Each entry defines a protocol and its pin assignments.

[[peripheral]]
protocol = "I2C"
sda = 8
scl = 9

[[peripheral]]
protocol = "UART"
rx = 16
tx = 17
